# .github/workflows/build-ee.yml
name: Build Execution Environment

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Repository
        uses: actions/checkout@v6

      # - name: Set up QEMU
      #   # Required for multi-architecture builds
      #   uses: docker/setup-qemu-action@v4

      # - name: Set up Docker Buildx
      #   # Enables advanced build features like multi-stage builds and pushing to registries
      #   uses: docker/setup-buildx-action@v4

      # - name: Login to the GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     # GITHUB_TOKEN is a built-in secret that has permissions to push to GHCR
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Ansible Builder
        # Install ansible-builder and other dependencies
        run: pip install ansible-builder podman

      - name: Build the Execution Environment
        # Use ansible-builder to generate the Containerfile and build the image
        run: ansible-builder build --tag ghcr.io/${{ github.repository_owner }}/my-execution-env:${{ github.sha }}

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: context
